# yaml-language-server: $schema=https://json.schemastore.org/pre-commit-hooks.json
---
- id: check-filename-pattern
  name: Check filenames for pattern
  description: Validate that filenames follow the specified pattern.
  entry: check-filename-pattern
  language: python
- id: check-no-commit-comment
  name: Check for `NO_COMMIT` comments
  description: >
    Validate that files don't have any `NO_COMMIT` comments (Python only).

    Inspired by:

    - https://github.com/elementary-data/elementary/blob/ef5043811a72009126391a3f0c8a18f72ae00b18/.pre-commit-config.yaml
  entry: check-no-commit-comment
  language: python
  types: ["python"]
- id: gitmoji-conventional-commit
  name: Gitmoji conventional commit message
  description: >
    Validate that commit messages follow conventional commits, with an
    optional gitmoji at the start of the header.

    - https://www.conventionalcommits.org/en/v1.0.0/
    - https://gitmoji.dev/
  entry: gitmoji-conventional-commit
  language: python
  always_run: true
  pass_filenames: true
  stages: ["commit-msg"]
- id: tidy-gitkeep
  name: Remove redundant .gitkeep files
  description: >
    Remove redundant .gitkeep files from the repository.

    A `.gitkeep` file is redundant if the directory it is in has any
    other tracked files. The tracked files can be in the same directory
    or in subdirectories.
  entry: tidy-gitkeep
  language: python
  files: ^.+\.gitkeep$
