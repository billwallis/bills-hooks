# yaml-language-server: $schema=https://json.schemastore.org/pre-commit-hooks.json
---
- id: banned-python-code
  name: Check for banned Python code
  description: Validate that Python files do not include "banned" code.
  entry: banned-python-code
  language: python
  types: ["python"]
- id: check-dbt-project-version
  name: Check dbt project version
  description: >
    Validate that the version specified in the `dbt_project.yml` file
    matches the Python project version (specified in, say, `setup.cfg`
    or `pyproject.toml` files).

    Note that this should be run as a local hook of type `unsupported`,
    not as part of this repo's hooks, as it needs the target repo to be
    installed so that it can parse the project installation metadata
    (namely, the version).
  entry: _check-dbt-project-version-warning
  language: python
  always_run: true
  pass_filenames: false
- id: check-filename-pattern
  name: Check filenames for pattern
  description: Validate that filenames follow the specified pattern.
  entry: check-filename-pattern
  language: python
- id: check-no-commit-comment
  name: Check for `NO_COMMIT` comments
  description: >
    Validate that files don't have `NO_COMMIT` text.

    In Python files, it only checks the comments. For all other files, it
    checks the entire content.

    Inspired by:

    - https://github.com/elementary-data/elementary/blob/ef5043811a72009126391a3f0c8a18f72ae00b18/.pre-commit-config.yaml
  entry: check-no-commit-comment
  language: python
- id: gitmoji-conventional-commit
  name: Gitmoji conventional commit message
  description: >
    Validate that commit messages follow conventional commits, with an
    optional gitmoji at the start of the header.

    - https://www.conventionalcommits.org/en/v1.0.0/
    - https://gitmoji.dev/
  entry: gitmoji-conventional-commit
  language: python
  always_run: true
  pass_filenames: true
  stages: ["commit-msg"]
- id: tidy-gitkeep
  name: Remove redundant .gitkeep files
  description: >
    Remove redundant .gitkeep files from the repository.

    A `.gitkeep` file is redundant if the directory it is in has any
    other tracked files. The tracked files can be in the same directory
    or in subdirectories.
  entry: tidy-gitkeep
  language: python
  files: ^.+\.gitkeep$
